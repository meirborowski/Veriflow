networks:
  veriflow:
    name: veriflow

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - veriflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - veriflow
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      SPAWNER_TYPE: docker
      RUNNER_IMAGE: veriflow-runner:latest
      DOCKER_SOCKET: /var/run/docker.sock
      DOCKER_NETWORK: veriflow
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - veriflow
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Build-only: pre-build the runner image so Docker spawner can use it locally.
  # Run: docker build -t veriflow-runner:latest ./worker
  # Or: docker compose build runner
  runner:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: veriflow-runner:latest
    profiles:
      - build-only

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
      - NEXT_PUBLIC_RUNNER_BASE_URL=http://client:3000
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - veriflow
    depends_on:
      - server

volumes:
  pgdata:
  miniodata:
